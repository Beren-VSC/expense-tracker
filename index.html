function useTweaks(defaults) {
  const [values, setValues] = useState(() => {
    try { const s = localStorage.getItem('exp_tweaks'); return s ? {...defaults, ...JSON.parse(s)} : defaults; } catch { return defaults; }
  });
  const setTweak = useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues(prev => {
      const next = { ...prev, ...edits };
      try { localStorage.setItem('exp_tweaks', JSON.stringify(next)); } catch {}
      return next;
    });
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = useState(false);
  const dragRef = useRef(null);
  const offsetRef = useRef({ x: 16, y: 16 });
  const PAD = 16;
  const clampToViewport = useCallback(() => {
    const panel = dragRef.current; if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    offsetRef.current = {
      x: Math.min(Math.max(PAD, window.innerWidth - w - PAD), Math.max(PAD, offsetRef.current.x)),
      y: Math.min(Math.max(PAD, window.innerHeight - h - PAD), Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);
  useEffect(() => {
    if (!open) return;
    clampToViewport();
    const ro = typeof ResizeObserver !== 'undefined' ? new ResizeObserver(clampToViewport) : null;
    if (ro) { ro.observe(document.documentElement); return () => ro.disconnect(); }
    window.addEventListener('resize', clampToViewport);
    return () => window.removeEventListener('resize', clampToViewport);
  }, [open, clampToViewport]);
  const onDragStart = e => {
    const panel = dragRef.current; if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = ev => {
      offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) };
      clampToViewport();
    };
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <button onClick={() => setOpen(o => !o)}
        style={{ position:'fixed', bottom:16, right:16, zIndex:2147483645,
          background:'rgba(250,249,247,0.9)', border:'.5px solid rgba(255,255,255,.6)',
          borderRadius:10, padding:'6px 12px', fontSize:12, fontWeight:600,
          cursor:'pointer', backdropFilter:'blur(16px)', boxShadow:'0 4px 16px rgba(0,0,0,.12)',
          display: open ? 'none' : 'block' }}>
        ⚙ Tweaks
      </button>
      {open && (
        <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
          <div className="twk-hd" onMouseDown={onDragStart}>
            <b>{title}</b>
            <button className="twk-x" onClick={() => setOpen(false)}>✕</button>
          </div>
          <div className="twk-body">{children}</div>
        </div>
      )}
    </>
  );
}

function TweakSection({ label, children }) {
  return <><div className="twk-sect">{label}</div>{children}</>;

function TweakRow({ label, value, children }) {
  return (
    <div className="twk-row">

}
function TweakSlider({ id, label, min=0, max=100, step=1, unit='', value, onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={e => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}
function __twkIsLight(hex) {
  const h = String(hex).replace('#','');
  const x = h.length===3 ? h.replace(/./g,c=>c+c) : h.padEnd(6,'0');
  const n = parseInt(x.slice(0,6),16);
  if (Number.isNaN(n)) return true;
  const r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  return r*299+g*587+b*114>148000;
}
const __TwkCheck = ({light}) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"
          stroke={light?'rgba(0,0,0,.78)':'#fff'}/>
  </svg>
);
function TweakColor({ id, label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value} onChange={e => onChange(e.target.value)}/>
      </div>
    );
  }
  const key = o => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips">
        {options.map((o,i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero] = colors;
          const on = key(o)===cur;
          return (
            <button key={i} className="twk-chip" data-on={on?'1':'0'}
                    style={{ background: hero }} onClick={() => onChange(o)}>
              {on && <__TwkCheck light={__twkIsLight(hero)}/>}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

const Donut = ({ cats, size=80 }) => {
  const total = cats.reduce((s,c)=>s+c.spent,0);
  const r=30, cx=40, cy=40, sw=11, circ=2*Math.PI*r; let off=0;
  const fmt1k = n => Math.abs(n)>=1000 ? `${(n/1000).toFixed(0)}k` : `${n}`;
  return (
    <svg width={size} height={size} viewBox="0 0 80 80">
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(255,255,255,0.1)" strokeWidth={sw}/>
      {cats.map((c,i) => {
        const dash=total>0?(c.spent/total)*circ:0;
        const el=<circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={c.color}
          strokeWidth={sw-1} strokeDasharray={`${dash} ${circ-dash}`}
          strokeDashoffset={-off} transform={`rotate(-90 ${cx} ${cy})`} strokeLinecap="round"/>;
        off+=dash; return el;
      })}
      <text x={cx} y={cy-4} textAnchor="middle" dominantBaseline="middle"
        style={{ fontFamily:'DM Sans,sans-serif', fontSize:6.5, fill:'rgba(255,255,255,0.45)', fontWeight:500 }}>
        {cats[0]?._isIncome ? 'รายรับ' : 'รายจ่าย'}
      </text>
      <text x={cx} y={cy+6} textAnchor="middle" dominantBaseline="middle"
        style={{ fontFamily:'DM Sans,sans-serif', fontSize:10, fill:'#fff', fontWeight:700 }}>
        {cats[0]?._isIncome ? `+${fmt1k(total)}` : fmt1k(total)}
      </text>
    </svg>
  );
};

const MONTHS_FULL = ['January','February','March','April','May','June','July','August','September','October','November','December'];

/* ── CALCULATOR INPUT ── */
const CalcInput = ({ value, onChange, C, accent }) => {
  const [show, setShow] = useState(false);
  const [expr, setExpr] = useState(value||'');
  const [justOp, setJustOp] = useState(false);

  const evaluate = e => {
    try {
      const result = Function('"use strict"; return (' + e.replace(/×/g,'*').replace(/÷/g,'/') + ')')();
      if (!isFinite(result) || isNaN(result)) return e;
      return String(Math.round(result * 100) / 100);
    } catch { return e; }
  };

  const press = k => {
    if (k === '⌫') {
      const n = expr.slice(0,-1); setExpr(n); setJustOp(false);
    } else if (['+','-','×','÷'].includes(k)) {
      const base = justOp ? expr.slice(0,-1) : expr;
      setExpr(base + k); setJustOp(true);
    } else if (k === '=') {
      const r = evaluate(expr); setExpr(r); onChange(r); setJustOp(false);
    } else if (k === 'DONE') {
      const r = evaluate(expr); onChange(r); setShow(false);
    } else if (k === '.' && expr.split(/[+\-×÷]/).pop().includes('.')) {
      return;
    } else {
      setExpr(expr + k); setJustOp(false);
    }
  };

  const openCalc = () => { setExpr(value||''); setJustOp(false); setShow(true); };

  const display = evaluate(expr);
  const showResult = expr !== display && !justOp;

  const btnStyle = (bg, fg='#1a1714') => ({
    padding:'16px 0', borderRadius:12, border:'none', fontSize:18, fontWeight:500,
    background:bg, color:fg, cursor:'pointer', transition:'transform .1s',
  });

  return (
    <>
      <div onClick={openCalc}
        style={{ width:'100%', padding:'10px 12px', borderRadius:10, fontSize:14,
          border:`1.5px solid ${show?accent:C.border}`, background:C.bg, color:C.text,
          cursor:'pointer', minHeight:42, display:'flex', alignItems:'center' }}>
        <span style={{ color: value ? C.text : C.textDim }}>{value || '0'}</span>
      </div>
      {show && (
        <div style={{ position:'fixed', inset:0, zIndex:300, display:'flex', flexDirection:'column', justifyContent:'flex-end' }}>
          <div onClick={()=>{ const r=evaluate(expr); onChange(r); setShow(false); }} style={{ flex:1, background:'rgba(0,0,0,0.45)' }}/>
          <div style={{ background:C.surface, borderRadius:'20px 20px 0 0', padding:'12px 16px 32px', boxShadow:'0 -4px 32px rgba(0,0,0,0.2)' }}>
            {/* Display */}
            <div style={{ padding:'6px 8px 14px', textAlign:'right' }}>
              <div style={{ fontSize:13, color:C.textDim, minHeight:18 }}>{showResult ? `= ${display}` : ' '}</div>
              <div style={{ fontSize:30, fontWeight:700, color:C.text, letterSpacing:.5, marginTop:2 }}>
                {expr||'0'}
              </div>
            </div>
            {/* Keys grid */}
            <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:8 }}>
              {[
                '7','8','9','÷',
                '4','5','6','×',
                '1','2','3','-',
                '.','0','⌫','+',
              ].map(k => (
                <button key={k} onClick={()=>press(k)}
                  style={btnStyle(
                    ['+','-','×','÷'].includes(k) ? accent+'22' :
                    k==='⌫' ? '#fee2e2' : C.surfaceAlt,
                    ['+','-','×','÷'].includes(k) ? accent :
                    k==='⌫' ? '#e05a4f' : C.text
                  )}
                  onMouseDown={e=>e.currentTarget.style.transform='scale(.93)'}
                  onMouseUp={e=>e.currentTarget.style.transform='scale(1)'}>
                  {k}
                </button>
              ))}
              <button onClick={()=>press('=')}
                style={{...btnStyle('#fbbf24','#1a1714'), gridColumn:'span 2'}}>
                =
              </button>
              <button onClick={()=>press('DONE')}
                style={{...btnStyle(accent,'#fff'), gridColumn:'span 2', fontWeight:600, fontSize:15}}>
                ✓ ยืนยัน
              </button>
            </div>
          </div>
        </div>
      )}
    </>
  );
};

/* ── DATE PICKER ── */
const DatePicker = ({ value, onChange, C }) => {
  const parseToISO = v => {
    const parts = (v||'').trim().split(' ');
    if (parts.length < 2) return '';
    const mi = MONTHS_FULL.findIndex(m => m === parts[0]);
    if (mi < 0) return '';
    const yr = new Date().getFullYear();
    return `${yr}-${String(mi+1).padStart(2,'0')}-${String(parts[1]).padStart(2,'0')}`;
  };
  const fromISO = iso => {
    if (!iso) return value;
    const d = new Date(iso + 'T12:00:00');
    return `${MONTHS_FULL[d.getMonth()]} ${d.getDate()}`;
  };
  return (
    <input type="date" value={parseToISO(value)}
      onChange={e => onChange(fromISO(e.target.value))}
      style={{ width:'100%', padding:'10px 12px', borderRadius:10, fontSize:14,
        border:`1.5px solid ${C.border}`, background:C.bg, color:C.text, outline:'none',
        WebkitAppearance:'none', appearance:'none' }}
      onFocus={e=>e.target.style.borderColor=C.accent}
      onBlur={e=>e.target.style.borderColor=C.border}
    />
  );
};
const _now = new Date();
const todayStr = `${MONTHS_FULL[_now.getMonth()]} ${_now.getDate()}`;

const resizeImage = (dataUrl) => new Promise(resolve => {
  const img = new Image();
  img.onload = () => {
    const max = 800, r = Math.min(max/img.width, max/img.height, 1);
    const c = document.createElement('canvas');
    c.width = img.width*r; c.height = img.height*r;
    c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
    resolve(c.toDataURL('image/jpeg', 0.65));
  };
  img.onerror = () => resolve(dataUrl);
  img.src = dataUrl;
});

const parseOcrText = (text) => {
  const amtPatterns = [
    /(?:total|amount|รวม|ยอดรวม|รวมทั้งสิ้น|net)[^\d]*([0-9,]+(?:\.[0-9]{1,2})?)/i,
    /฿\s*([0-9,]+(?:\.[0-9]{1,2})?)/,
    /([0-9,]{3,}(?:\.[0-9]{2})?)\s*(?:thb|baht|บาท)/i,
  ];
  let amt = '';
  for (const p of amtPatterns) { const m = text.match(p); if (m) { amt = m[1].replace(/,/g,''); break; } }
  if (!amt) {
    const nums = [...text.matchAll(/([0-9,]+\.[0-9]{2})/g)].map(m=>parseFloat(m[1].replace(/,/g,'')));
    if (nums.length) amt = String(Math.max(...nums));
  }
  let dateStr = todayStr;
  const dm = text.match(/(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2,4})/);
  if (dm) { const mo = parseInt(dm[2])-1; if (mo>=0&&mo<12) dateStr = `${MONTHS_FULL[mo]} ${dm[1]}`; }
  return { amt, dateStr };
};

  const set = (k,v) => setForm(f => ({...f,[k]:v}));

    setType(t);
    setForm({ catId: t==='income' ? 'salary' : 'food', desc:'', amt:'', date:todayStr });
    setImg(null); setStatus(null);
  };

  useEffect(() => {
    const id = setTimeout(() => setEntered(true), 30);
    return () => clearTimeout(id);
  }, []);

  const handleFile = async e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async ev => {
      const rawUrl = ev.target.result;
      const dataUrl = await resizeImage(rawUrl);
      setImg(dataUrl);
      setStatus('scanning');
      try {
        if (window.claude) {
          const isIncome = type === 'income';
          const prompt = isIncome
            ? `Extract from this receipt/slip: source name (concise, max 20 chars), total amount received as plain number in Thai Baht, date as "Month DD" (English full month name). Pick income category from: salary, bonus, freelance, invest, other. Reply ONLY JSON: {"desc":"Salary","amt":25000,"date":"May 1","cat":"salary"}`

          const result = await window.claude.complete({
            messages:[{ role:'user', content:[
              { type:'image', source:{ type:'base64', media_type:'image/jpeg', data:dataUrl.split(',')[1] }},
              { type:'text', text: prompt }
            ]}]
          });
          const match = result.match(/\{[\s\S]*?\}/);
          if (match) {
            const p = JSON.parse(match[0]);
            const aCats = isIncome ? incomeCats : cats;
            const catId = aCats.find(c=>c.id===p.cat) ? p.cat : (isIncome?'salary':'food');
            const item = { id:Date.now(), desc:p.desc||'', amt:Math.round(Number(p.amt)), date:p.date||todayStr, receipt:true, receiptImg:dataUrl };
            if (Number(p.amt) > 0) {

            }
            setForm({ catId, desc:p.desc||'', amt:p.amt?String(Math.round(p.amt)):'', date:p.date||todayStr });
          }
        } else {
          // Tesseract.js OCR fallback (lazy load)
          if (!window.Tesseract) {
            setStatus('scanning');
            await new Promise((res,rej) => {
              const s = document.createElement('script');
              s.src = 'https://unpkg.com/tesseract.js@2.1.5/dist/tesseract.min.js';
              s.onload = res; s.onerror = rej;
              document.head.appendChild(s);
            });
          }
          const { createWorker } = window.Tesseract;
          const worker = createWorker({
            workerPath: 'https://unpkg.com/tesseract.js@2.1.5/dist/worker.min.js',
            corePath: 'https://unpkg.com/tesseract.js-core@2.2.4/tesseract-core.wasm.js',
            langPath: 'https://tessdata.projectnaptha.com/4.0.0_fast',
          });
          await worker.load();
          await worker.loadLanguage('eng');
          await worker.initialize('eng');
          const { data: { text } } = await worker.recognize(dataUrl);
          await worker.terminate();
          const { amt, dateStr } = parseOcrText(text);
          if (amt) { setForm(f => ({...f, amt, date:dateStr})); setStatus('manual'); return; }
        }
      } catch(err) { console.warn('Scan err:', err); }
      setStatus('manual');
    };
    reader.readAsDataURL(file);
  };

  const handleSave = () => {

                  <button onClick={()=>onCat(cat.id)}

/* ── CALENDAR SCREEN ── */
const CAL_MONTHS = [
  { label:'มกราคม',     en:'January',   days:31, firstDay:3 },
  { label:'กุมภาพันธ์', en:'February',  days:28, firstDay:6 },
  { label:'มีนาคม',     en:'March',     days:31, firstDay:6 },
  { label:'เมษายน',     en:'April',     days:30, firstDay:2 },
  { label:'พฤษภาคม',   en:'May',       days:31, firstDay:4 },
  { label:'มิถุนายน',   en:'June',      days:30, firstDay:0 },
  { label:'กรกฎาคม',   en:'July',      days:31, firstDay:2 },
  { label:'สิงหาคม',   en:'August',    days:31, firstDay:5 },
  { label:'กันยายน',   en:'September', days:30, firstDay:1 },
  { label:'ตุลาคม',    en:'October',   days:31, firstDay:3 },
  { label:'พฤศจิกายน', en:'November',  days:30, firstDay:6 },
  { label:'ธันวาคม',   en:'December',  days:31, firstDay:1 },
];

const CalendarScreen = ({ T, C, cats, incomeCats, onDeleteExpense, onDeleteIncome }) => {
  const [view, setView] = useState('expense');
  const [sel, setSel]   = useState(null);
  const [mo, setMo]     = useState(new Date().getMonth());
  const { label:moLabel, en:moEn, days:daysInMonth, firstDay } = CAL_MONTHS[mo];
  const _today = new Date(); const todayDay = _today.getDate(); const isCurrentMonth = mo === _today.getMonth();
  const weeks=[]; let d=1-firstDay;
  for(let w=0;w<6;w++){const wk=[];for(let x=0;x<7;x++,d++)wk.push(d>=1&&d<=daysInMonth?d:null);if(wk.some(x=>x))weeks.push(wk);}

  const spendByDay = useMemo(() => {
    const map={};
    const re = new RegExp(moEn+' (\\d+)');
    cats.forEach(cat=>cat.items.forEach(item=>{ const m=item.date.match(re); if(m){const day=Number(m[1]);map[day]=(map[day]||0)+item.amt;} }));
    return map;
  }, [cats, mo]);

  const incomeByDay = useMemo(() => {
    const map={};
    const re = new RegExp(moEn+' (\\d+)');
    incomeCats.forEach(cat=>cat.items.forEach(item=>{ const m=item.date.match(re); if(m){const day=Number(m[1]);map[day]=(map[day]||0)+item.amt;} }));
    return map;
  }, [incomeCats]);

  const dayMap   = view==='income' ? incomeByDay : spendByDay;
  const maxVal   = Object.values(dayMap).length ? Math.max(...Object.values(dayMap)) : 1;
  const dotColor = view==='income' ? '#10b981' : C.accent;

  const selExpItems = sel ? cats.flatMap(cat=>cat.items.filter(i=>i.date===`${moEn} ${sel}`).map(i=>({...i,catColor:cat.color,catId:cat.id}))) : [];
  const selIncItems = sel ? incomeCats.flatMap(cat=>cat.items.filter(i=>i.date===`${moEn} ${sel}`).map(i=>({...i,catColor:cat.color,catId:cat.id}))) : [];
  const selItems    = view==='income' ? selIncItems : selExpItems;

  return (
    <div style={{ flex:1, overflowY:'auto', background:C.bg }}>
      <div style={{ padding:'10px 16px 8px', background:C.surface, borderBottom:`1px solid ${C.border}` }}>
        <div style={{ fontSize:16*T.fontScale, fontWeight:700, color:C.text }}>ประวัติ</div>
        <div style={{ display:'flex', alignItems:'center', gap:6, marginTop:4 }}>
          <button onClick={()=>{ setMo(m=>Math.max(0,m-1)); setSel(null); }}
            style={{ background:'none', border:'none', cursor:'pointer', fontSize:20, color:C.textDim, padding:'0 4px', lineHeight:1 }}>‹</button>
          <span style={{ fontSize:14, fontWeight:600, color:C.text, minWidth:90, textAlign:'center' }}>{moLabel} 2569</span>
          <button onClick={()=>{ setMo(m=>Math.min(CAL_MONTHS.length-1,m+1)); setSel(null); }}
            style={{ background:'none', border:'none', cursor:'pointer', fontSize:20, color:C.textDim, padding:'0 4px', lineHeight:1 }}>›</button>
        </div>
      </div>
      <div style={{ display:'flex', background:C.surface, borderBottom:`1px solid ${C.border}` }}>
        {[['expense','💸 รายจ่าย'],['income','💰 รายรับ']].map(([v,label]) => (
          <button key={v} onClick={()=>{ setView(v); setSel(null); }}
            style={{ flex:1, padding:'10px 0', border:'none', background:'none', cursor:'pointer',
              borderBottom: view===v ? `2.5px solid ${v==='income'?'#10b981':C.accent}` : '2.5px solid transparent',
              color: view===v ? (v==='income'?'#10b981':C.accent) : C.textDim,
              fontWeight: view===v ? 600 : 400, fontSize:13, transition:'color .15s' }}>
            {label}
          </button>
        ))}
      </div>
      <div style={{ margin:'12px 14px 0', background:C.surface, borderRadius:14, padding:'12px 10px', boxShadow:C.shadow }}>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', marginBottom:6 }}>
          {['จ','อ','พ','พฤ','ศ','ส','อา'].map(l=><div key={l} style={{ textAlign:'center', fontSize:10, color:C.textDim, fontWeight:600 }}>{l}</div>)}
        </div>
        {weeks.map((wk,wi)=>(
          <div key={wi} style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:3, marginBottom:3 }}>
            {wk.map((day,di)=>{
              const val=day?dayMap[day]||0:0, isSel=sel===day, isToday=isCurrentMonth&&day===todayDay;
              const intensity=val?Math.round((val/maxVal)*50+15):0;
              const hex=intensity.toString(16).padStart(2,'0');
              return (
                <div key={di} onClick={()=>day&&setSel(isSel?null:day)}
                  style={{ height:40, borderRadius:9, cursor:day?'pointer':'default',
                    background:isSel?dotColor:val?`${dotColor}${hex}`:day?C.bg:'transparent',
                    border:isToday&&!isSel?`2px solid ${dotColor}`:'2px solid transparent',
                    display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:2, transition:'background .15s' }}>
                  {day&&<>
                    <span style={{ fontSize:12, fontWeight:isToday||isSel?700:400, color:isSel?'#fff':C.text }}>{day}</span>
                    {val>0&&!isSel&&<div style={{ width:4,height:4,borderRadius:'50%',background:dotColor }}/>}
                  </>}
                </div>
              );
            })}
          </div>
        ))}
      </div>
      {sel&&selItems.length>0&&(
        <div style={{ margin:'10px 14px 0', background:C.surface, borderRadius:12, padding:'12px', boxShadow:C.shadow }}>
          <div style={{ fontSize:13*T.fontScale, fontWeight:600, color:C.text, marginBottom:8 }}>
            {sel} {moLabel} — {view==='income'?'+':''}{fmt(dayMap[sel]||0)}
          </div>
          {selItems.map(item=>(
            <div key={item.id} style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'6px 0', borderTop:`1px solid ${C.border}` }}>
              <div style={{ display:'flex', alignItems:'center', gap:7 }}>
                <span style={{ width:7,height:7,borderRadius:'50%',background:item.catColor,display:'inline-block' }}/>
                <span style={{ fontSize:13, color:C.text }}>{item.desc}</span>
              </div>
              <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                <span style={{ fontSize:13, fontWeight:600, color:view==='income'?item.catColor:C.text }}>
                  {view==='income'?'+':''}{fmt(item.amt)}
                </span>
                <button onClick={()=>{ view==='income'?onDeleteIncome({catId:item.catId,itemId:item.id}):onDeleteExpense({catId:item.catId,itemId:item.id}); }}
                  style={{ background:'none', border:'none', cursor:'pointer', fontSize:15, color:'#e05a4f', lineHeight:1, padding:'2px 2px' }}>🗑</button>
              </div>
            </div>
          ))}
        </div>
      )}
      <div style={{ padding:'14px 16px 6px' }}>
        <span style={{ fontSize:11, fontWeight:600, color:C.textMid, textTransform:'uppercase', letterSpacing:'.06em' }}>เดือนก่อนหน้า</span>
      </div>
      {view==='expense' ? (
        [...HISTORY].reverse().map((m,i)=>{
          const over=m.spent>m.budget;
          return (
            <div key={i} style={{ margin:'0 14px 8px', background:C.surface, borderRadius:12, padding:'12px', boxShadow:C.shadow }}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:6 }}>
                <span style={{ fontSize:14*T.fontScale, fontWeight:600, color:C.text }}>{m.label} 2569</span>
                <span style={{ fontSize:14*T.fontScale, fontWeight:700, color:over?'#e05a4f':C.text }}>{fmt(m.spent)}</span>
              </div>
              <Bar pct={m.spent/m.budget*100} color={over?'#e05a4f':C.accent} bg={C.surfaceAlt}/>
              <div style={{ textAlign:'right', marginTop:3 }}><span style={{ fontSize:10, color:C.textDim }}>งบ {fmt(m.budget)}</span></div>
            </div>
          );
        })
      ) : (
        [...INCOME_HISTORY].reverse().map((m,i)=>{
          const maxInc=Math.max(...INCOME_HISTORY.map(x=>x.income));
          return (
            <div key={i} style={{ margin:'0 14px 8px', background:C.surface, borderRadius:12, padding:'12px', boxShadow:C.shadow }}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:6 }}>
                <span style={{ fontSize:14*T.fontScale, fontWeight:600, color:C.text }}>{m.label} 2569</span>
                <span style={{ fontSize:14*T.fontScale, fontWeight:700, color:'#10b981' }}>+{fmt(m.income)}</span>
              </div>
              <Bar pct={m.income/maxInc*100} color="#10b981" bg={C.surfaceAlt}/>
            </div>
          );
        })
      )}
      <div style={{ height:16 }}/>
    </div>
  );
};

/* ── CATEGORY DETAIL ── */
const CategoryDetail = ({ cat, T, C, onBack, onDeleteItem }) => {
  const [viewImg, setViewImg] = useState(null);
  if (!cat) return null;
  const pct=cat.spent/cat.budget*100, over=cat.spent>cat.budget;
  return (
    <div style={{ flex:1, overflowY:'auto', background:C.bg }}>
      <div style={{ background:cat.color, padding:'10px 16px 18px' }}>
        <button onClick={onBack} style={{ background:'none', border:'none', cursor:'pointer',
          display:'flex', alignItems:'center', gap:4, marginBottom:12 }}>
          <span style={{ fontSize:22, color:'rgba(255,255,255,0.8)', lineHeight:1 }}>‹</span>
          <span style={{ fontSize:13, fontWeight:500, color:'rgba(255,255,255,0.7)' }}>กลับ</span>
        </button>
        <div style={{ display:'flex', alignItems:'center', gap:14 }}>
          <div style={{ width:52, height:52, borderRadius:15, background:'rgba(255,255,255,0.22)',
            display:'flex', alignItems:'center', justifyContent:'center', fontSize:26 }}>{cat.icon}</div>
          <div>
            <div style={{ fontSize:12, color:'rgba(255,255,255,0.7)', fontWeight:500 }}>{cat.name}</div>
            <div style={{ fontSize:30*T.fontScale, fontWeight:700, color:'#fff', lineHeight:1.1 }}>{fmt(cat.spent)}</div>
          </div>
        </div>
        <div style={{ marginTop:12 }}>
          <div style={{ display:'flex', justifyContent:'space-between', marginBottom:5 }}>
            <span style={{ fontSize:11, color:'rgba(255,255,255,0.65)' }}>งบ {fmt(cat.budget)}</span>
            <span style={{ fontSize:11, fontWeight:600, color:over?'rgba(255,180,180,0.95)':'rgba(255,255,255,0.65)' }}>
              {over?'⚠ เกินงบ':`เหลือ ${fmt(cat.budget-cat.spent)}`}
            </span>
          </div>
          <Bar pct={pct} color="rgba(255,255,255,0.85)" h={6} bg="rgba(255,255,255,0.2)"/>
        </div>
      </div>
      <div style={{ padding:'12px 0' }}>
        <div style={{ padding:'0 16px 8px' }}>
          <span style={{ fontSize:11, fontWeight:600, color:C.textMid, textTransform:'uppercase', letterSpacing:'.06em' }}>
            ทั้งหมด {cat.count} รายการ
          </span>
        </div>
        {cat.items.map(item=>(
          <div key={item.id} style={{ display:'flex', alignItems:'center', gap:12,
            padding:'11px 16px', background:C.surface, borderBottom:`1px solid ${C.border}` }}>
            <div onClick={()=>item.receiptImg&&setViewImg(item.receiptImg)}
              style={{ width:42, height:42, borderRadius:10, flexShrink:0, overflow:'hidden',
                background:item.receipt?cat.color+'18':C.surfaceAlt,
                border:`1.5px solid ${item.receipt?cat.color+'55':C.border}`,
                display:'flex', alignItems:'center', justifyContent:'center', fontSize:18,
                cursor:item.receiptImg?'pointer':'default' }}>
              {item.receiptImg
                ? <img src={item.receiptImg} style={{ width:'100%', height:'100%', objectFit:'cover' }}/>
                : item.receipt ? '🧾' : <span style={{ color:C.textDim, fontSize:14 }}>—</span>}
            </div>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:14*T.fontScale, fontWeight:500, color:C.text }}>{item.desc||'(ไม่มีชื่อ)'}</div>
              <div style={{ fontSize:11, color:C.textDim, marginTop:1 }}>{item.date}</div>
            </div>
            <div style={{ display:'flex', alignItems:'center', gap:8 }}>
              <span style={{ fontSize:14*T.fontScale, fontWeight:700, color:C.text }}>{fmt(item.amt)}</span>
              <button onClick={()=>onDeleteItem(item.id)}
                style={{ background:'none', border:'none', cursor:'pointer', fontSize:15, color:'#e05a4f', lineHeight:1, padding:'4px' }}>🗑</button>
            </div>
          </div>
        ))}
        {viewImg && (
          <div onClick={()=>setViewImg(null)} style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.85)',
            zIndex:200, display:'flex', alignItems:'center', justifyContent:'center', padding:16 }}>
            <img src={viewImg} style={{ maxWidth:'100%', maxHeight:'90vh', borderRadius:12, objectFit:'contain' }}/>
            <button onClick={()=>setViewImg(null)} style={{ position:'absolute', top:20, right:20,
              background:'rgba(255,255,255,0.15)', border:'none', borderRadius:'50%', width:36, height:36,
              color:'#fff', fontSize:18, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>✕</button>
          </div>
        )}
      </div>
    </div>
  );
};

/* ── BOOK SCREEN ── */
const BookScreen = ({ T, C }) => {
  const [notes, setNotes] = useState(() => {
    try { return JSON.parse(localStorage.getItem('exp_notes') || '[]'); } catch { return []; }
  });
  const [draft, setDraft] = useState('');
  const save = () => {
    if (!draft.trim()) return;
    const updated = [{ id:Date.now(), text:draft.trim(), date:todayStr }, ...notes];
    setNotes(updated);
    localStorage.setItem('exp_notes', JSON.stringify(updated));
    setDraft('');
  };
  const del = id => {
    const updated = notes.filter(n => n.id !== id);
    setNotes(updated);
    localStorage.setItem('exp_notes', JSON.stringify(updated));
  };
  return (
    <div style={{ flex:1, overflowY:'auto', background:C.bg }}>
      <div style={{ padding:'10px 16px 10px', background:C.surface, borderBottom:`1px solid ${C.border}` }}>
        <div style={{ fontSize:16*T.fontScale, fontWeight:700, color:C.text }}>บันทึก</div>
      </div>
      <div style={{ padding:'14px 16px', display:'flex', flexDirection:'column', gap:10 }}>
        <textarea value={draft} onChange={e=>setDraft(e.target.value)}
          placeholder="เขียนบันทึก..."
          rows={3}
          style={{ width:'100%', padding:'12px', borderRadius:12, fontSize:14, lineHeight:1.55,
            border:`1.5px solid ${C.border}`, background:C.surface, color:C.text, outline:'none',
            resize:'none', fontFamily:'inherit' }}
          onFocus={e=>e.target.style.borderColor=C.accent}
          onBlur={e=>e.target.style.borderColor=C.border}
        />
        <button onClick={save}
          style={{ padding:'11px', borderRadius:10, border:'none', background:C.accent,
            color:'#fff', fontSize:14, fontWeight:600, cursor:'pointer' }}>
          + เพิ่มบันทึก
        </button>
      </div>
      {notes.length === 0 && (
        <div style={{ textAlign:'center', padding:'32px 16px', color:C.textDim, fontSize:13 }}>ยังไม่มีบันทึก</div>
      )}
      {notes.map(n => (
        <div key={n.id} style={{ margin:'0 16px 10px', background:C.surface, borderRadius:12,
          padding:'12px 14px', boxShadow:C.shadow }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:8 }}>
            <div style={{ flex:1, fontSize:14, color:C.text, lineHeight:1.55, whiteSpace:'pre-wrap' }}>{n.text}</div>
            <button onClick={()=>del(n.id)}
              style={{ background:'none', border:'none', cursor:'pointer', color:'#e05a4f', fontSize:16, padding:'0', flexShrink:0 }}>🗑</button>
          </div>
          <div style={{ fontSize:11, color:C.textDim, marginTop:6 }}>{n.date}</div>
        </div>
      ))}
      <div style={{ height:16 }}/>
    </div>
  );
};

/* ── NAV ── */
const Nav = ({ screen, onNav, C }) => (
  <div style={{ display:'flex', borderTop:`1px solid ${C.border}`, background:C.surface, flexShrink:0 }}>
    {[
      { id:'home',    label:'หน้าหลัก', icon:<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> },
      { id:'book',    label:'บันทึก',   icon:<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/><line x1="12" y1="6" x2="16" y2="6"/><line x1="12" y1="10" x2="16" y2="10"/></svg> },
      { id:'history', label:'ประวัติ',  icon:<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> },
    ].map(t => {
      const active=screen===t.id;
      return (
        <button key={t.id} onClick={()=>onNav(t.id)}
          style={{ flex:1, background:'none', border:'none', cursor:'pointer',
            display:'flex', flexDirection:'column', alignItems:'center', gap:3,
            padding:'9px 0 14px', color:active?C.accent:C.textDim, transition:'color .2s' }}>
          {t.icon}
          <span style={{ fontSize:10, fontWeight:active?600:400 }}>{t.label}</span>
        </button>
      );
    })}
  </div>
);

/* ── FAB ── */
const FAB = ({ C, onClick }) => (
  <button onClick={onClick}
    style={{ position:'absolute', bottom:74, right:16, width:50, height:50,
      borderRadius:16, background:C.accent, border:'none', cursor:'pointer',
      display:'flex', alignItems:'center', justifyContent:'center',
      boxShadow:`0 4px 16px ${C.accent}55`, zIndex:10 }}
    onMouseDown={e=>e.currentTarget.style.transform='scale(.94)'}
    onMouseUp={e=>e.currentTarget.style.transform='scale(1)'}>
    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>
);

/* ── APP ── */
const App = () => {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const C = useMemo(() => mk(tweaks), [tweaks.accent, tweaks.heroColor, tweaks.bgColor]);
  const T = tweaks;

  const [cats, setCats] = useState(() => {
    try {
      const s = localStorage.getItem('exp_cats');
      if (!s) return INIT_CATS;
      const saved = JSON.parse(s);
      const savedIds = new Set(saved.map(c => c.id));
      const added = INIT_CATS.filter(c => !savedIds.has(c.id));
      return [...saved, ...added];
    } catch { return INIT_CATS; }
  });
  const [incomeCats, setIncomeCats] = useState(() => {
    try {
      const s = localStorage.getItem('exp_income');
      if (!s) return INIT_INCOME_CATS;
      const saved = JSON.parse(s);
      const savedIds = new Set(saved.map(c => c.id));
      const added = INIT_INCOME_CATS.filter(c => !savedIds.has(c.id));
      return [...saved, ...added];
    } catch { return INIT_INCOME_CATS; }
  });
  useEffect(() => { try { localStorage.setItem('exp_cats', JSON.stringify(cats)); } catch {} }, [cats]);
  useEffect(() => { try { localStorage.setItem('exp_income', JSON.stringify(incomeCats)); } catch {} }, [incomeCats]);
  const totalSpent   = useMemo(() => cats.reduce((s,c)=>s+c.spent,0),  [cats]);
  const totalBudget  = useMemo(() => cats.reduce((s,c)=>s+c.budget,0), [cats]);
  const totalIncome  = useMemo(() => incomeCats.reduce((s,c)=>s+c.items.reduce((ss,i)=>ss+i.amt,0),0), [incomeCats]);

  const [screen, setScreen] = useState('home');
  const [catId, setCatId]   = useState(null);
  const [showSheet, setShowSheet] = useState(false);

  const goHome = () => { setScreen('home'); setCatId(null); };

  const addItem = ({ catId:cId, item }) => {
    setCats(cs => cs.map(c => c.id===cId ? { ...c, items:[item,...c.items], spent:c.spent+item.amt, count:c.count+1 } : c));
  };
  const addIncome = ({ catId:cId, item }) => {
    setIncomeCats(cs => cs.map(c => c.id===cId ? { ...c, items:[item,...c.items] } : c));
  };
  const deleteExpenseItem = ({ catId:cId, itemId }) => {
    setCats(cs => cs.map(c => {
      if (c.id !== cId) return c;
      const gone = c.items.find(i => i.id === itemId);
      return { ...c, items: c.items.filter(i => i.id !== itemId), spent: c.spent - (gone?.amt||0), count: c.count - 1 };
    }));
  };
  const deleteIncomeItem = ({ catId:cId, itemId }) => {
    setIncomeCats(cs => cs.map(c => c.id===cId ? { ...c, items:c.items.filter(i=>i.id!==itemId) } : c));
  };

  const activeCat = catId ? cats.find(c=>c.id===catId) : null;
  const heroColor = activeCat ? activeCat.color : screen==='home' ? C.hero : C.surface;
  const statusFg  = activeCat||screen==='home' ? 'rgba(255,255,255,0.75)' : C.text;
  const statusSub = activeCat||screen==='home' ? 'rgba(255,255,255,0.5)' : C.textDim;

  return (
    <div style={{ position:'relative' }}>
      <div style={{ width:360, height:720, background:C.surface, borderRadius:40, overflow:'hidden',
        boxShadow:`0 24px 60px rgba(0,0,0,0.28), 0 0 0 8px ${C.hero}`,
        display:'flex', flexDirection:'column', position:'relative' }}>

        {/* Status bar removed */}

        {activeCat ? (
          <CategoryDetail cat={activeCat} T={T} C={C} onBack={goHome} onDeleteItem={itemId=>deleteExpenseItem({catId:activeCat.id,itemId})}/>
        ) : screen==='history' ? (
          <CalendarScreen T={T} C={C} cats={cats} incomeCats={incomeCats} onDeleteExpense={deleteExpenseItem} onDeleteIncome={deleteIncomeItem}/>
        ) : screen==='book' ? (
          <BookScreen T={T} C={C}/>
        ) : (
          <Dashboard T={T} C={C} cats={cats} incomeCats={incomeCats} totalSpent={totalSpent} totalBudget={totalBudget}
            totalIncome={totalIncome} onCat={id=>{ setCatId(id); setScreen('cat'); }}/>
        )}

        {!activeCat && <Nav screen={screen} onNav={s=>{ setScreen(s); setCatId(null); }} C={C}/>}
        {!activeCat && <FAB C={C} onClick={()=>setShowSheet(true)}/>}
      </div>

      {/* Sheet overlay — outside overflow:hidden so slide animation works */}
      {showSheet && (
        <div style={{ position:'absolute', top:0, left:0, width:360, height:720,
          borderRadius:40, overflow:'hidden', zIndex:50, pointerEvents:'auto' }}>
          <AddExpenseSheet C={C} T={T} cats={cats} incomeCats={incomeCats}
            onAdd={addItem} onAddIncome={addIncome} onClose={()=>setShowSheet(false)}/>
        </div>
      )}

      <TweaksPanel title="Tweaks">
        <TweakSection label="Color">
          <TweakColor id="accent"    label="Accent"          value={tweaks.accent}    options={['#6c63ff','#f4875a','#4dcaa3','#e05a8a','#3a9bd5']} onChange={v=>setTweak('accent',v)}/>
          <TweakColor id="heroColor" label="Hero background" value={tweaks.heroColor} options={['#1c1a16','#0f1724','#1a1a2e','#1a1609','#111827']} onChange={v=>setTweak('heroColor',v)}/>
          <TweakColor id="bgColor"   label="Page background" value={tweaks.bgColor}   options={['#faf8f4','#f5f5f5','#fef9f0','#f0f4ff','#fff']}    onChange={v=>setTweak('bgColor',v)}/>
        </TweakSection>
        <TweakSection label="Type scale">
          <TweakSlider id="fontScale" label="Font scale" value={tweaks.fontScale} min={0.85} max={1.2} step={0.05} onChange={v=>setTweak('fontScale',v)}/>
        </TweakSection>
      </TweaksPanel>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
</script>
</body>
</html>
